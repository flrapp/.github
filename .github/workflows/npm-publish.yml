name: NPM Publish

on:
  workflow_call:
    inputs:
      package-name:
        description: 'Full npm package name, e.g. @flrapp/core'
        type: string
        required: true
      workspace:
        description: 'Workspace path, e.g. packages/core'
        type: string
        required: true
      version:
        description: 'Package version (x.y.z), used for manual dispatch. If empty, extracted from tag.'
        type: string
        required: false
        default: ''
    secrets:
      NPM_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Extract version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF##*/}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Update package version
        run: npm version ${{ steps.version.outputs.VERSION }} --workspace ${{ inputs.workspace }} --no-git-tag-version

      - name: Build package
        run: npx turbo build --filter=${{ inputs.package-name }}

      - name: Publish to npm
        run: npm publish --workspace ${{ inputs.workspace }} --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
